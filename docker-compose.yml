services:
  app:
    build: .
    container_name: jabuti_app
    ports:
      - "8000:8000"
    depends_on:
      - db
      - cache
    env_file:
      - .env
    volumes:
      - .:/code

  db:
    image: postgres:16
    container_name: jabuti_db
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  cache:
    image: redis:7
    container_name: jabuti_cache
    ports:
      - "6379:6379"

volumes:
  postgres_data: